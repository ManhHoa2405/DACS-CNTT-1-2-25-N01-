<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông tin tài khoản</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" th:href="@{/css/reset.css}" />
    <link rel="stylesheet" th:href="@{/css/user.css}" />
    <link rel="stylesheet" th:href="@{/css/account.css}" />

    <style>
      body {
        background-color: #fafafa; /* Nền xám nhạt */
      }

      /* CSS cho thanh menu Tài khoản giữa Header */
      .nav-account {
        display: flex;
        gap: 15px;
        list-style: none;
        margin: 0;
        padding: 0;
        align-items: center;
      }
      .nav-account li a {
        text-decoration: none;
        color: #666;
        font-weight: 500;
        font-size: 1.4rem;
        padding: 12px 44px;
        border-radius: 5px;
        transition: all 0.3s ease;
      }
      .nav-account li a:hover {
        color: #333;
      }
      /* Class active để bôi đen nền mục đang được chọn */
      .nav-account li.active a {
        background-color: #f2f2f2;
        color: #333;
        font-weight: 600;
      }

      .profile-container {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        max-width: 1000px;
        margin: 0px auto;
        padding: 0 20px;
      }
      .profile-box {
        flex: 1;
        min-width: 300px;
        background: #fff;
        padding: 30px;
        border: 1px solid #eaeaea;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }
      .profile-box h2 {
        font-size: 1.5rem;
        margin-bottom: 25px;
        border-bottom: 2px solid #5a6d57;
        padding-bottom: 10px;
        display: inline-block;
      }
      .form-group {
        margin-bottom: 15px;
        text-align: left;
      }
      .form-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
        color: #333;
      }
      .form-group input {
        width: 95%;
        padding: 12px;
        border: 1px solid #ccc;
        outline: none;
        transition: border-color 0.3s;
      }
      .form-group input:focus {
        border-color: #5a6d57;
      }
      .form-group input[readonly] {
        background-color: #f9f9f9;
        color: #888;
        cursor: not-allowed;
      }
      .btn-submit {
        width: 100%;
        padding: 15px;
        background-color: #5a6d57;
        color: white;
        border: none;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.3s;
        margin-top: 10px;
      }
      .btn-submit:hover {
        background-color: #4a5a48;
      }
    </style>
  </head>
  <body>
    <header
      class="header"
      style="background-color: #fff; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05)"
    >
      <div class="banner"><p>Miễn phí vận chuyển cho mọi đơn hàng</p></div>
      <nav class="navbar">
        <a th:href="@{/user/homePage}" title="Trang chủ">
          <img th:src="@{/img/Logo.svg}" alt="Modimal" />
        </a>

        <ul class="nav-account">
          <li class="active">
            <a th:href="@{/user/profile}">Thông Tin Cá Nhân</a>
          </li>
          <li>
            <a th:href="@{/user/purchase}">Đơn Hàng</a>
          </li>
          <li>
            <a th:href="@{/user/change-password}">Đổi Mật Khẩu</a>
          </li>
        </ul>

        <div class="actions">
          <div class="account">
            <a th:href="@{/user/profile}">
              <img th:src="@{/img/Header profile icon.svg}" alt="Profile" />
            </a>
          </div>
          <div class="cart">
            <a th:href="@{/user/cart}">
              <img th:src="@{/img/Header bag icon.svg}" alt="Cart" />
            </a>
          </div>
        </div>
      </nav>
    </header>

    <main
      style="background-color: #fafafa; padding-bottom: 60px; padding-top: 40px"
    >
      <div
        th:if="${successMessage}"
        style="
          color: #155724;
          background-color: #d4edda;
          border: 1px solid #c3e6cb;
          text-align: center;
          padding: 15px;
          margin: 0 auto 20px;
          max-width: 600px;
          font-weight: bold;
          border-radius: 5px;
        "
      >
        <span th:text="${successMessage}"></span>
      </div>

      <div
        th:if="${error}"
        style="
          color: #721c24;
          background-color: #f8d7da;
          border: 1px solid #f5c6cb;
          text-align: center;
          padding: 15px;
          margin: 0 auto 20px;
          max-width: 600px;
          font-weight: bold;
          border-radius: 5px;
        "
      >
        <span th:text="${error}"></span>
      </div>

      <div class="profile-container" style="max-width: 600px; margin: 0 auto">
        <div
          class="profile-box"
          style="
            background: #fff;
            padding: 40px;
            border: 1px solid #eaeaea;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
          "
        >
          <h2
            style="
              font-size: 1.5rem;
              margin-bottom: 25px;
              border-bottom: 2px solid #5a6d57;
              padding-bottom: 10px;
              display: inline-block;
              color: #333;
            "
          >
            Thông tin cá nhân
          </h2>

          <form method="post" th:action="@{/user/profile/update}">
            <div
              class="form-group"
              style="margin-bottom: 20px; text-align: left"
            >
              <label
                style="
                  display: block;
                  margin-bottom: 8px;
                  font-weight: 500;
                  color: #333;
                "
                >Họ và Tên</label
              >
              <input
                type="text"
                name="name"
                th:value="${session.currentUser.name}"
                required
                style="
                  padding: 12px;
                  border: 1px solid #ccc;
                  border-radius: 5px;
                  outline: none;
                  font-family: &quot;Montserrat&quot;, sans-serif;
                "
              />
            </div>

            <div
              class="form-group"
              style="margin-bottom: 20px; text-align: left"
            >
              <label
                style="
                  display: block;
                  margin-bottom: 8px;
                  font-weight: 500;
                  color: #333;
                "
                >Số điện thoại</label
              >
              <input
                type="text"
                name="phone"
                th:value="${session.currentUser.phone}"
                required
                style="
                  padding: 12px;
                  border: 1px solid #ccc;
                  border-radius: 5px;
                  outline: none;
                  font-family: &quot;Montserrat&quot;, sans-serif;
                "
              />
            </div>

            <div
              class="form-group"
              style="margin-bottom: 20px; text-align: left"
            >
              <label
                style="
                  display: block;
                  margin-bottom: 8px;
                  font-weight: 500;
                  color: #333;
                "
                >Email (Không thể thay đổi)</label
              >
              <input
                type="email"
                name="email"
                th:value="${session.currentUser.email}"
                readonly
                style="
                  padding: 12px;
                  border: 1px solid #ccc;
                  border-radius: 5px;
                  background-color: #f9f9f9;
                  color: #888;
                  outline: none;
                  font-family: &quot;Montserrat&quot;, sans-serif;
                "
              />
            </div>

            <button
              type="submit"
              class="btn-submit"
              style="
                width: 100%;
                padding: 15px;
                background-color: #5a6d57;
                color: white;
                border: none;
                border-radius: 5px;
                font-size: 1rem;
                font-weight: 600;
                cursor: pointer;
                margin-top: 10px;
                font-family: &quot;Montserrat&quot;, sans-serif;
              "
            >
              Cập Nhật Thông Tin
            </button>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
