<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/reset.css}" />
    <link rel="stylesheet" th:href="@{/css/admin.css}" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
  </head>

  <body>
    <div class="content">
      <!-- ================= Left Content ================= -->
      <div class="left-content">
        <h1>ADMIN CONTROL</h1>

        <div class="divider"></div>

        <!-- Sidebar -->
        <nav class="side-bar">
          <ul>
            <li class="active">
              <a th:href="@{/admin/dashboard}">
                <img th:src="@{/img/Subtract.svg}" /> Tổng quan
              </a>
            </li>

            <li>
              <a th:href="@{/admin/addProduct}">
                <img th:src="@{/img/add-icon.svg}" /> Thêm sản phẩm
              </a>
            </li>

            <li>
              <a th:href="@{/admin/manageProduct}">
                <img th:src="@{/img/manage-product.svg}" /> Quản lý sản phẩm
              </a>
            </li>

            <li>
              <a th:href="@{/admin/manageOrder}">
                <img th:src="@{/img/manage-order.svg}" /> Quản lý đơn hàng
              </a>
            </li>

            <li>
              <a th:href="@{/admin/manageCustomer}">
                <img th:src="@{/img/customer.svg}" /> Khách hàng
              </a>
            </li>
          </ul>
        </nav>
      </div>

      <!-- ================= Right Content ================= -->
      <div class="right-content">
        <h1>Tổng quan hệ thống</h1>

        <!-- Top content -->
        <div class="general">
          <div class="general-item" style="border-left: solid 2px blue">
            <div class="menu-title">Tổng đơn hàng</div>
            <div class="data" th:text="${succeessOrders}"></div>
          </div>

          <div class="general-item" style="border-left: solid 2px green">
            <div class="menu-title">Doanh thu</div>
            <div class="data" th:text="${sumOrdersDelivered}"></div>
          </div>

          <div class="general-item" style="border-left: solid 2px yellow">
            <div class="menu-title">Khách hàng</div>
            <div class="data" th:text="${totalCusotomer}"></div>
          </div>

          <div class="general-item" style="border-left: solid 2px red">
            <div class="menu-title">Sản phẩm</div>
            <div class="data" th:text="${totalProducts}"></div>
          </div>
        </div>

        <!-- Bottom content -->
        <div class="bottom-content">
          <div class="menu-orders">
            <h1>Đơn hàng mới nhất</h1>

            <div class="table-wrapper">
              <table class="order-table">
                <thead>
                  <tr>
                    <th>Mã đơn hàng</th>
                    <th>Khách hàng</th>
                    <th>Ngày đặt</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                  </tr>
                </thead>

                <tbody>
                  <tr th:each="order : ${orders}">
                    <td th:text="${order.id}"></td>
                    <td th:text="${order.receiveName}"></td>
                    <td >
                      <div class="up" th:text="${#temporals.format(order.createAt,'dd/MM/yyyy')}"></div>
                      <small th:text ="${#temporals.format(order.createAt, 'HH:mm:ss')}"></small>
                    </td>
                    <td th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA',0,'POINT')} + ' VND'"></td>
                    <td>
                      <span class="status"
                            th:classappend="${#strings.toString(order.status) == 'PENDING' ? 'status-warning' :
                                          (#strings.toString(order.status) == 'CONFIRMED' ? 'status-info' :
                                          (#strings.toString(order.status) == 'SHIPPING' ? 'status-orange' :
                                          (#strings.toString(order.status) == 'DELIVERED' ? 'status-success' : 'status-danger')))}"
                            
                            th:text="${#strings.toString(order.status) == 'PENDING' ? 'Chờ xử lý' :
                                    (#strings.toString(order.status) == 'CONFIRMED' ? 'Đã xác nhận' :
                                    (#strings.toString(order.status) == 'SHIPPING' ? 'Đang giao' :
                                    (#strings.toString(order.status) == 'DELIVERED' ? 'Thành công' : 'Đã hủy')))}">
                      </span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

            <!-- Pagination (demo UI) -->
            <div class="pagination" th:if="${totalPages > 1}">
              <button th:onclick="|window.location.href='/admin/dashboard?page=${currentPage - 1}'|" 
                      th:disabled="${currentPage == 0}">
                ‹
              </button>
              
              <button th:each="i: ${#numbers.sequence(0, totalPages - 1)}"
                      th:onclick="|window.location.href='/admin/dashboard?page=${i}'|"
                      th:classappend="${currentPage == i ? 'active' : ''}"
                      th:text="${i + 1}">
              </button>
             
              <button th:onclick="|window.location.href='/admin/dashboard?page=${currentPage + 1}'|" 
                      th:disabled="${currentPage == totalPages - 1}">
                ›
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- JS -->
    <script th:src="@{/js/sidebar-active.js}"></script>
  </body>
</html>
